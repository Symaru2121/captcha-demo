<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Captcha</title>
    <style>
        /* Box-sizing reset */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ================================================================
       UNIFIED TOP BAR
       ================================================================ */
    .top-bar {
      background: #161822;
      border-bottom: 1px solid #23263A;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 56px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .logo svg {
      width: 28px;
      height: 28px;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 700;
      color: #E4E4E8;
      letter-spacing: -0.02em;
    }

    .logo-tag {
      font-size: 10px;
      font-weight: 600;
      color: #E4E4E8;
      background: #2A2D3E;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .separator {
      width: 1px;
      height: 24px;
      background: #23263A;
      flex-shrink: 0;
    }

    .complexity-control {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .complexity-label {
      font-size: 12px;
      color: #7A7B85;
      white-space: nowrap;
    }

    .complexity-slider {
      width: 160px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #23263A;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    .complexity-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #B8B9C1;
      cursor: pointer;
    }

    .complexity-value {
      font-size: 13px;
      font-weight: 700;
      color: #E4E4E8;
      min-width: 28px;
      text-align: center;
    }

    .refresh-btn {
      margin-left: auto;
      background: #1E2030;
      color: #B8B9C1;
      border: 1px solid #23263A;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      white-space: nowrap;
      transition: background 0.2s, border-color 0.2s;
    }

    .refresh-btn:hover {
      background: #23263A;
      border-color: #3A3D52;
    }

        /* Base page styles matching production */
        html, body {
            padding: 0;
            margin: 0;
            background: #0F1117;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Layout shell */
        .shell {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Root container */
        #app {
            padding: 12px 16px 12px;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            box-sizing: border-box;
        }

        /* Title */
        #title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 4px;
            text-align: center;
        }

        /* Subtitle */
        #subtitle {
            font-size: 13px;
            color: #666;
            margin-bottom: 12px;
            text-align: center;
        }

        /* Canvas wrapper */
        #canvasWrap {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Canvas */
        #captchaCanvas {
            display: block;
            width: 320px;
            height: 240px;
            cursor: pointer;
            border-radius: 12px;
            touch-action: manipulation;
            background: #fff;
        }

        /* Status text */
        #status {
            font-size: 14px;
            color: #888;
            margin-top: 8px;
            min-height: 20px;
            text-align: center;
        }

        /* Confidence display */
        #resultMeta {
            min-height: 18px;
            margin-top: 2px;
            text-align: center;
        }

        #confidence {
            font-size: 12px;
            color: #666;
        }

        /* Actions container */
        #actions {
            margin-top: 10px;
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }





        /* Footer */
        #footer {
            font-size: 11px;
            color: #bbb;
            margin-top: 6px;
            text-align: center;
        }

        /* Status color classes */
        .status-success {
            color: #1f8f47 !important;
        }

        .status-error {
            color: #c53b3b !important;
        }

        .status-neutral {
            color: #888 !important;
        }
    </style>
</head>

<div class="shell">
  <div class="top-bar">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#B8B9C1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 11 12 14 22 4"></polyline>
        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
      </svg>
      <span class="logo-text">Captcha Sandbox</span>
      <span class="logo-tag">DEMO</span>
    </div>
    <div class="separator"></div>
    <div class="complexity-control">
      <span class="complexity-label">Сложность:</span>
      <input type="range" id="complexitySlider" class="complexity-slider" min="1" max="100" value="50">
      <span class="complexity-value" id="complexityValue">50</span>
    </div>
    <button id="refreshBtn" class="refresh-btn" onclick="handleNewTask()">
      <span style="margin-right:6px;">↻</span>
      Новое задание
    </button>
  </div>

<div id="app">
    <div id="title">Найдите лишнее</div>
    <div id="subtitle">Нажмите на символ, который не подходит к остальным</div>

    <div id="canvasWrap">
        <canvas id="captchaCanvas" width="320" height="240" aria-label="Капча Найдите лишнее"></canvas>
    </div>

    <div id="status" aria-live="polite"></div>

    <div id="resultMeta">
        <span id="confidence"></span>
    </div>



    <div id="footer">Задание займёт пару секунд</div>
</div>

            (bp.catA === catA && bp.catB === catB) ||
            (bp.catA === catB && bp.catB === catA);
        if (samePair && complexity < bp.minComplexity) return true;
    }
    return false;
}

// ============================================================
// Family proximity (production logic)
// ============================================================
function isCloseFamily(familyA, familyB) {
    return familyA === familyB;
}

// ============================================================
// Canvas constants (production geometry)
// ============================================================
var CANVAS_CSS_W = 320;
var CANVAS_CSS_H = 240;
var OUTER_PAD = 14;
var GAP = 10;
var GRID_COLS = 3;
var GRID_ROWS = 2;
var CELL_RADIUS = 8;

// ============================================================
// Highlight colors (production values)
// ============================================================
var SUCCESS_STROKE = '#1f8f47';
var SUCCESS_FILL = 'rgba(31, 143, 71, 0.18)';
var ERROR_STROKE = '#c53b3b';
var ERROR_FILL = 'rgba(197, 59, 59, 0.18)';

// ============================================================
// Utility: Clamp complexity to 1..100
// ============================================================
function clampComplexity(value) {
    var n = Math.round(Number(value) || 1);
    return Math.max(1, Math.min(100, n));
}

// ============================================================
// Utility: Seeded PRNG (mulberry32, production-compatible)
// ============================================================
function mulberry32(seed) {
    var t = seed >>> 0;
    return function() {
        t += 0x6D2B79F5;
        var r = Math.imul(t ^ (t >>> 15), 1 | t);
        r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
        return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
    };
}

// ============================================================
// Utility: Random integer [0, maxExclusive)
// ============================================================
function randomInt(maxExclusive) {
    return Math.floor(Math.random() * maxExclusive);
}

// ============================================================
// Utility: Weighted random choice from candidates
// ============================================================
function weightedChoice(candidates) {
    var total = 0;
    for (var i = 0; i < candidates.length; i++) total += candidates[i].weight;
    var r = randomInt(total);
    var acc = 0;
    for (var i = 0; i < candidates.length; i++) {
        acc += candidates[i].weight;
        if (r < acc) return candidates[i].value;
    }
    return candidates[candidates.length - 1].value;
}

// ============================================================
// Utility: Fisher-Yates shuffle in place
// ============================================================
function shuffleInPlace(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
        var j = randomInt(i + 1);
        var tmp = arr[i];
        arr[i] = arr[j];
        arr[j] = tmp;
    }
    return arr;
}

// ============================================================
// Utility: Sample n distinct items without replacement
// ============================================================
function sampleDistinctItems(itemIDs, n) {
    var pool = itemIDs.slice();
    if (n >= pool.length) return shuffleInPlace(pool);
    for (var i = 0; i < n; i++) {
        var j = i + randomInt(pool.length - i);
        var tmp = pool[i];
        pool[i] = pool[j];
        pool[j] = tmp;
    }
    return pool.slice(0, n);
}

// ============================================================
// Utility: Sample one random item from array
// ============================================================
function sampleOneItem(itemIDs) {
    return itemIDs[randomInt(itemIDs.length)];
}

// ============================================================
// Complexity -> difficulty profile (production mapping)
// ============================================================
function difficultyProfileFor(level) {
    var p = {
        complexity: level,
        allowedBands: [],
        bandWeights: [],
        closeFamilyProb: 0,
        styleFlags: 0
    };

    if (level <= 20) {
        p.allowedBands = [BAND_EASY];
        p.bandWeights = [100];
        p.closeFamilyProb = 0;
        p.styleFlags = 0x00;
    } else if (level <= 40) {
        p.allowedBands = [BAND_EASY, BAND_MEDIUM];
        p.bandWeights = [70, 30];
        p.closeFamilyProb = 5;
        p.styleFlags = 0x02;
    } else if (level <= 60) {
        p.allowedBands = [BAND_EASY, BAND_MEDIUM];
        p.bandWeights = [25, 75];
        p.closeFamilyProb = 25;
        p.styleFlags = 0x03;
    } else if (level <= 80) {
        p.allowedBands = [BAND_MEDIUM, BAND_HARD];
        p.bandWeights = [45, 55];
        p.closeFamilyProb = 55;
        p.styleFlags = 0x07;
    } else {
        p.allowedBands = [BAND_MEDIUM, BAND_HARD];
        p.bandWeights = [45, 55];
        p.closeFamilyProb = 80;
        p.styleFlags = 0x0F;
    }

    return p;
}

// ============================================================
// Choose base category using weighted band selection
// ============================================================
function chooseBaseCategory(profile) {
    var candidates = [];

    for (var i = 0; i < CATEGORIES.length; i++) {
        var cat = CATEGORIES[i];
        if (cat.itemIDs.length < 6) continue;
        for (var j = 0; j < profile.allowedBands.length; j++) {
            if (cat.difficultyBand === profile.allowedBands[j]) {
                candidates.push({ value: cat, weight: profile.bandWeights[j] });
                break;
            }
        }
    }

    if (!candidates.length) {
        return CATEGORIES.find(function(c) { return c.difficultyBand === BAND_EASY && c.itemIDs.length >= 6; }) || CATEGORIES[0];
    }

    return weightedChoice(candidates);
}

// ============================================================
// Choose outlier category (production logic)
// ============================================================
function chooseOutlierCategory(baseCat, profile) {
    var allowClose = randomInt(100) < profile.closeFamilyProb;
    var candidates = [];

    for (var i = 0; i < CATEGORIES.length; i++) {
        var cat = CATEGORIES[i];
        if (cat.id === baseCat.id) continue;
        if (cat.itemIDs.length < 1) continue;

        var close = isCloseFamily(cat.familyId, baseCat.familyId);
        if (close && !allowClose) continue;
        if (isPairBlacklisted(baseCat.id, cat.id, profile.complexity)) continue;

        candidates.push(cat);
    }

    if (!candidates.length) {
        return CATEGORIES.find(function(c) { return c.id !== baseCat.id; }) || CATEGORIES[0];
    }

    return candidates[randomInt(candidates.length)];
}

// ============================================================
// Place items into 6-cell array with outlier at correctCell
// ============================================================
function placeItems(baseItems, outlierItem, correctCell) {
    var cells = new Array(6);
    cells[correctCell] = outlierItem;
    var baseIdx = 0;
    for (var i = 0; i < 6; i++) {
        if (i === correctCell) continue;
        cells[i] = baseItems[baseIdx++];
    }
    return cells;
}

// ============================================================
// Confidence scoring (production logic)
// ============================================================
function timingAdjustment(renderToClickMs) {
    if (renderToClickMs < 250) return -20;
    if (renderToClickMs < 450) return -12;
    if (renderToClickMs < 700) return -6;
    if (renderToClickMs <= 8000) return 0;
    if (renderToClickMs <= 15000) return -3;
    if (renderToClickMs <= 30000) return -6;
    return -10;
}

function signalAdjustment(params) {
    var adj = 0;

    if (!params.insideCell) adj -= 15;
    if (params.pointerCount === 0) adj -= 10;
    if (params.pointerCount > 4) adj -= 5;
    if (params.canvasFocused) adj += 2;
    if (params.trustedPointer) adj += 1;

    if (adj < -20) adj = -20;
    if (adj > 3) adj = 3;
    return adj;
}

function computeConfidence(params) {
    if (!params.isCorrect) return 0;

    var confidence = 80;
    confidence += timingAdjustment(params.elapsedMs);
    confidence += signalAdjustment({
        insideCell: true,
        trustedPointer: true,
        canvasFocused: params.canvasFocused,
        pointerCount: params.pointerCount
    });

    confidence = Math.max(0, Math.min(95, confidence));
    return confidence;
}

// ============================================================
// Main application class
// ============================================================
function App() {
    this.canvas = null;
    this.ctx = null;
    this.dpr = 1;

    this.statusEl = null;
    this.confidenceEl = null;
    this.footerEl = null;
    this.sliderEl = null;
    this.sliderValueEl = null;
    this.refreshButton = null;
    this.newTaskButton = null;

    this.pointerCount = 0;
    this.canvasFocusedRecently = false;
    this._focusTimer = null;

    this.state = {
        challengeId: '',
        complexity: 50,
        profile: null,
        baseCategoryID: 0,
        outlierCategoryID: 0,
        correctCell: 0,
        cellItemIDs: [],
        renderSeed: 0,
        styleFlags: 0,
        cells: [],
        firstRenderAt: 0,
        solved: false,
        selectedCell: null,
        result: null,
        confidence: null,
        revealCorrectCell: false,
        footerHidden: false
    };
}

// ============================================================
// Initialize and run the app
// ============================================================
App.prototype.run = function() {
    this.cacheDom();
    this.setupCanvas();
    this.bindEvents();
    this.updateComplexityLabel();

    // Draw initial placeholder
    this.ctx.fillStyle = '#f8f8f8';
    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

    // Generate first challenge immediately
    this.generateChallenge();
};

// ============================================================
// Cache DOM references
// ============================================================
App.prototype.cacheDom = function() {
    this.canvas = document.getElementById('captchaCanvas');
    this.ctx = this.canvas.getContext('2d');
    this.statusEl = document.getElementById('status');
    this.confidenceEl = document.getElementById('confidence');
    this.footerEl = document.getElementById('footer');
    this.sliderEl = document.getElementById('complexitySlider');
    this.sliderValueEl = document.getElementById('complexityValue');
    this.refreshButton = document.getElementById('refreshBtn');
    this.newTaskButton = document.getElementById('refreshBtn');
};

// ============================================================
// Setup canvas with DPR scaling
// ============================================================
App.prototype.setupCanvas = function() {
    this.dpr = window.devicePixelRatio || 1;
    this.canvas.width = CANVAS_CSS_W * this.dpr;
    this.canvas.height = CANVAS_CSS_H * this.dpr;
    this.canvas.style.width = CANVAS_CSS_W + 'px';
    this.canvas.style.height = CANVAS_CSS_H + 'px';
};

// ============================================================
// Bind all event listeners
// ============================================================
App.prototype.bindEvents = function() {
    var self = this;

    // Slider input updates label
    this.sliderEl.addEventListener('input', function() {
        self.updateComplexityLabel();
    });

    // Refresh button generates new challenge
    this.refreshButton.addEventListener('click', function() {
        self.generateChallenge();
    });

    // New task button is now handled by refreshBtn and global handleNewTask

    // Canvas pointer tracking for confidence scoring
    this.canvas.addEventListener('pointerenter', function() {
        self.canvasFocusedRecently = true;
        if (self._focusTimer) {
            clearTimeout(self._focusTimer);
            self._focusTimer = null;
        }
    });

    this.canvas.addEventListener('pointerleave', function() {
        if (self._focusTimer) clearTimeout(self._focusTimer);
        self._focusTimer = setTimeout(function() {
            self.canvasFocusedRecently = false;
            self._focusTimer = null;
        }, 500);
    });

    // Canvas click handler
    this.canvas.addEventListener('pointerdown', function(evt) {
        self.handleCanvasPointerDown(evt);
    });
};

// ============================================================
// Update the complexity label text
// ============================================================
App.prototype.updateComplexityLabel = function() {
    this.sliderValueEl.textContent = this.sliderEl.value;
};

// ============================================================
// Generate a new challenge
// ============================================================
App.prototype.generateChallenge = function() {
    var complexity = clampComplexity(this.sliderEl.value);
    var profile = difficultyProfileFor(complexity);
    var baseCat = chooseBaseCategory(profile);
    var outlierCat = chooseOutlierCategory(baseCat, profile);
    var baseItems = sampleDistinctItems(baseCat.itemIDs, 5);
    var outlierItem = sampleOneItem(outlierCat.itemIDs);
    var correctCell = randomInt(6);
    var cellItemIDs = placeItems(baseItems, outlierItem, correctCell);
    var renderSeed = (Math.random() * 0x100000000) >>> 0;

    this.state.challengeId = 'local-' + Date.now() + '-' + Math.random().toString(16).slice(2);
    this.state.complexity = complexity;
    this.state.profile = profile;
    this.state.baseCategoryID = baseCat.id;
    this.state.outlierCategoryID = outlierCat.id;
    this.state.correctCell = correctCell;
    this.state.cellItemIDs = cellItemIDs;
    this.state.renderSeed = renderSeed;
    this.state.styleFlags = profile.styleFlags;
    this.state.solved = false;
    this.state.selectedCell = null;
    this.state.result = null;
    this.state.confidence = null;
    this.state.revealCorrectCell = false;

    // Reset pointer count for new challenge
    this.pointerCount = 0;

    // Build layout cells
    this.state.cells = this.buildLayout();
    this.state.firstRenderAt = performance.now();

    // Reset UI
    this.resetResultUI();
    this.render();

    // Hide footer after first generation
    if (this.footerEl && !this.state.footerHidden) {
        this.footerEl.style.display = 'none';
        this.state.footerHidden = true;
    }
};

// ============================================================
// Build grid layout with seeded variations
// ============================================================
App.prototype.buildLayout = function() {
    var dpr = this.dpr;
    var w = CANVAS_CSS_W * dpr;
    var h = CANVAS_CSS_H * dpr;
    var pad = OUTER_PAD * dpr;
    var gap = GAP * dpr;
    var cellW = (w - pad * 2 - gap * (GRID_COLS - 1)) / GRID_COLS;
    var cellH = (h - pad * 2 - gap * (GRID_ROWS - 1)) / GRID_ROWS;
    var baseFontPx = Math.min(cellW, cellH) * 0.55;

    var complexity = this.state.complexity;

    // Variation ranges based on complexity (production values)
    var sizeVar = complexity <= 20 ? 0.02 :
                  complexity <= 40 ? 0.04 :
                  complexity <= 60 ? 0.07 :
                  complexity <= 80 ? 0.10 : 0.12;

    var rotMax = complexity <= 20 ? 0 :
                 complexity <= 40 ? 3 :
                 complexity <= 60 ? 5 :
                 complexity <= 80 ? 7 : 9;

    var offMax = complexity <= 20 ? 2 :
                 complexity <= 40 ? 3 :
                 complexity <= 60 ? 5 :
                 complexity <= 80 ? 7 : 9;

    // Use seeded RNG for deterministic layout
    var rng = mulberry32(this.state.renderSeed);

    var cells = [];
    for (var row = 0; row < GRID_ROWS; row++) {
        for (var col = 0; col < GRID_COLS; col++) {
            var index = row * GRID_COLS + col;
            var x = pad + col * (cellW + gap);
            var y = pad + row * (cellH + gap);

            // Per-cell seeded variations
            var sizeScale = 1 + (rng() * 2 - 1) * sizeVar;
            var fontPx = baseFontPx * sizeScale;
            var rotDeg = (rng() * 2 - 1) * rotMax;
            var offsetX = (rng() * 2 - 1) * offMax * dpr;
            var offsetY = (rng() * 2 - 1) * offMax * dpr;

            // Slightly varying bluish HSL background (production formula)
            var hueShift = Math.floor(rng() * 20 + 210);
            var saturation = 10 + Math.floor(rng() * 15);
            var lightness = 93 + Math.floor(rng() * 5);
            var bgColor = 'hsl(' + hueShift + ', ' + saturation + '%, ' + lightness + '%)';

            cells.push({
                index: index,
                x: x,
                y: y,
                w: cellW,
                h: cellH,
                centerX: x + cellW / 2,
                centerY: y + cellH / 2,
                fontPx: fontPx,
                rotationRad: rotDeg * Math.PI / 180,
                offsetX: offsetX,
                offsetY: offsetY,
                bgColor: bgColor
            });
        }
    }

    return cells;
};

// ============================================================
// Draw a rounded rectangle path (compatible, no roundRect API)
// ============================================================
App.prototype.drawRoundedCellPath = function(ctx, cell, radius) {
    ctx.beginPath();
    ctx.moveTo(cell.x + radius, cell.y);
    ctx.lineTo(cell.x + cell.w - radius, cell.y);
    ctx.arcTo(cell.x + cell.w, cell.y, cell.x + cell.w, cell.y + radius, radius);
    ctx.lineTo(cell.x + cell.w, cell.y + cell.h - radius);
    ctx.arcTo(cell.x + cell.w, cell.y + cell.h, cell.x + cell.w - radius, cell.y + cell.h, radius);
    ctx.lineTo(cell.x + radius, cell.y + cell.h);
    ctx.arcTo(cell.x, cell.y + cell.h, cell.x, cell.y + cell.h - radius, radius);
    ctx.lineTo(cell.x, cell.y + radius);
    ctx.arcTo(cell.x, cell.y, cell.x + radius, cell.y, radius);
    ctx.closePath();
};

// ============================================================
// Draw highlight overlay on a cell
// ============================================================
App.prototype.drawCellHighlight = function(ctx, cell, fillStyle, strokeStyle, lineWidth) {
    var r = CELL_RADIUS * this.dpr;

    // Fill
    this.drawRoundedCellPath(ctx, cell, r);
    ctx.fillStyle = fillStyle;
    ctx.fill();

    // Stroke
    this.drawRoundedCellPath(ctx, cell, r);
    ctx.lineWidth = lineWidth;
    ctx.strokeStyle = strokeStyle;
    ctx.stroke();
};

// ============================================================
// Draw a single cell (background + glyph)
// ============================================================
App.prototype.drawCell = function(ctx, cell, glyph) {
    var r = CELL_RADIUS * this.dpr;

    // Draw rounded cell background
    this.drawRoundedCellPath(ctx, cell, r);
    ctx.fillStyle = cell.bgColor;
    ctx.fill();

    // Draw emoji glyph
    ctx.font = cell.fontPx + 'px system-ui, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#000000';

    ctx.save();
    ctx.translate(cell.centerX + cell.offsetX, cell.centerY + cell.offsetY);
    if (cell.rotationRad !== 0) {
        ctx.rotate(cell.rotationRad);
    }
    ctx.fillText(glyph, 0, 0);
    ctx.restore();
};

// ============================================================
// Draw decorative noise (production-style)
// ============================================================
App.prototype.drawNoise = function(ctx) {
    var complexity = this.state.complexity;
    var dpr = this.dpr;
    var w = this.canvas.width;
    var h = this.canvas.height;

    // Separate noise RNG
    var rng = mulberry32(this.state.renderSeed + 1000);

    // Dots
    var dotCount = complexity <= 40 ? 3 : complexity <= 60 ? 6 : complexity <= 80 ? 10 : 15;
    for (var i = 0; i < dotCount; i++) {
        var x = rng() * w;
        var y = rng() * h;
        var radius = (rng() * 2 + 0.5) * dpr;
        var alpha = 0.03 + rng() * 0.05;
        var hue = Math.floor(rng() * 360);
        ctx.fillStyle = 'hsla(' + hue + ', 30%, 60%, ' + alpha + ')';
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();
    }

    // Optional lines for higher complexity
    if (complexity > 60) {
        var lineCount = complexity <= 80 ? 2 : 4;
        for (var i = 0; i < lineCount; i++) {
            ctx.strokeStyle = 'rgba(150, 150, 150, ' + (0.02 + rng() * 0.03) + ')';
            ctx.lineWidth = 0.5 * dpr;
            ctx.beginPath();
            ctx.moveTo(rng() * w, rng() * h);
            ctx.lineTo(rng() * w, rng() * h);
            ctx.stroke();
        }
    }
};

// ============================================================
// Draw result highlight overlays
// ============================================================
App.prototype.drawResultOverlays = function(ctx) {
    if (!this.state.solved || this.state.selectedCell === null) return;

    var dpr = this.dpr;
    var hlLine = 3 * dpr;
    var cells = this.state.cells;

    for (var i = 0; i < cells.length; i++) {
        var cell = cells[i];

        // Correct answer: green highlight on selected cell
        if (this.state.result === 'correct' && this.state.selectedCell === cell.index) {
            this.drawCellHighlight(ctx, cell, SUCCESS_FILL, SUCCESS_STROKE, hlLine);
        }

        // Wrong answer: red highlight on selected cell
        if (this.state.result === 'wrong' && this.state.selectedCell === cell.index) {
            this.drawCellHighlight(ctx, cell, ERROR_FILL, ERROR_STROKE, hlLine);
        }

        // Wrong answer after reveal: green highlight on correct cell
        if (this.state.result === 'wrong' && this.state.revealCorrectCell && this.state.correctCell === cell.index) {
            this.drawCellHighlight(ctx, cell, SUCCESS_FILL, SUCCESS_STROKE, hlLine);
        }
    }
};

// ============================================================
// Main render function
// ============================================================
App.prototype.render = function() {
    var ctx = this.ctx;

    // Clear canvas with white background
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

    var cells = this.state.cells;
    var cellItemIDs = this.state.cellItemIDs;

    // Draw all 6 cells
    for (var i = 0; i < cells.length; i++) {
        var glyph = ITEM_GLYPHS[cellItemIDs[i]] || '?';
        this.drawCell(ctx, cells[i], glyph);
    }

    // Draw noise if styleFlags has bit 0x01 set
    if (this.state.styleFlags & 0x01) {
        this.drawNoise(ctx);
    }

    // Draw result overlays on top
    this.drawResultOverlays(ctx);
};

// ============================================================
// Convert pointer event to canvas coordinates
// ============================================================
App.prototype.getCanvasPoint = function(evt) {
    var rect = this.canvas.getBoundingClientRect();
    var x = (evt.clientX - rect.left) * (this.canvas.width / rect.width);
    var y = (evt.clientY - rect.top) * (this.canvas.height / rect.height);
    return { x: x, y: y };
};

// ============================================================
// Hit test: find which cell was clicked
// ============================================================
App.prototype.hitTest = function(px, py) {
    var cells = this.state.cells;
    for (var i = 0; i < cells.length; i++) {
        var cell = cells[i];
        if (px >= cell.x && px <= cell.x + cell.w && py >= cell.y && py <= cell.y + cell.h) {
            return cell.index;
        }
    }
    return -1;
};

// ============================================================
// Handle pointer down on canvas
// ============================================================
App.prototype.handleCanvasPointerDown = function(evt) {
    this.pointerCount += 1;

    // Ignore if no challenge loaded
    if (!this.state.cellItemIDs.length) return;
    // Ignore if already solved
    if (this.state.solved) return;

    var pt = this.getCanvasPoint(evt);
    var cellIdx = this.hitTest(pt.x, pt.y);
    if (cellIdx < 0) return;

    var elapsedMs = Math.max(0, performance.now() - this.state.firstRenderAt);
    var isCorrect = cellIdx === this.state.correctCell;

    this.applyResult(cellIdx, isCorrect, elapsedMs);
};

// ============================================================
// Apply result after click
// ============================================================
App.prototype.applyResult = function(cellIdx, isCorrect, elapsedMs) {
    this.state.solved = true;
    this.state.selectedCell = cellIdx;
    this.state.result = isCorrect ? 'correct' : 'wrong';
    this.state.revealCorrectCell = false;

    this.state.confidence = computeConfidence({
        isCorrect: isCorrect,
        elapsedMs: elapsedMs,
        pointerCount: this.pointerCount,
        canvasFocused: this.canvasFocusedRecently
    });

    this.updateStatusUI();
    this.render();

    // If wrong, reveal correct cell after 500ms
    if (!isCorrect) {
        var self = this;
        setTimeout(function() {
            if (self.state.result === 'wrong') {
                self.state.revealCorrectCell = true;
                self.render();
            }
        }, 500);
    }
};

// ============================================================
// Update status text, confidence, and button visibility
// ============================================================
App.prototype.updateStatusUI = function() {
    this.statusEl.classList.remove('status-success', 'status-error', 'status-neutral');

    if (this.state.result === 'correct') {
        this.statusEl.textContent = '\u2713 \u041F\u0440\u0430\u0432\u0438\u043B\u044C\u043D\u043E!';
        this.statusEl.classList.add('status-success');
        this.confidenceEl.textContent = '\u0423\u0432\u0435\u0440\u0435\u043D\u043D\u043E\u0441\u0442\u044C: ' + this.state.confidence + '%';
        // newTaskButton hidden toggle removed (now in top bar)
        this.canvas.style.cursor = 'default';
        return;
    }

    if (this.state.result === 'wrong') {
        this.statusEl.textContent = '\u2717 \u041D\u0435\u043F\u0440\u0430\u0432\u0438\u043B\u044C\u043D\u043E';
        this.statusEl.classList.add('status-error');
        this.confidenceEl.textContent = '\u0423\u0432\u0435\u0440\u0435\u043D\u043D\u043E\u0441\u0442\u044C: ' + this.state.confidence + '%';
        // newTaskButton hidden toggle removed (now in top bar)
        this.canvas.style.cursor = 'default';
        return;
    }

    this.statusEl.textContent = '';
    this.statusEl.classList.add('status-neutral');
    this.confidenceEl.textContent = '';
    // newTaskButton hidden toggle removed (now in top bar)
    this.canvas.style.cursor = 'pointer';
};

// ============================================================
// Reset result UI for new challenge
// ============================================================
App.prototype.resetResultUI = function() {
    this.statusEl.textContent = '';
    this.statusEl.classList.remove('status-success', 'status-error', 'status-neutral');
    this.statusEl.classList.add('status-neutral');
    this.confidenceEl.textContent = '';
    // newTaskButton hidden toggle removed (now in top bar)
    this.canvas.style.cursor = 'pointer';
};

// ============================================================
// Boot the application on DOM ready
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
    var app = new App();
    app.run();

    // Global handler for unified top bar button
    window.handleNewTask = function() {
        app.generateChallenge();
    };
});
</script>

<!-- Parent-iframe integration: incoming commands + outgoing event forwarding -->
<script>
(function () {
  // Only activate when running inside an iframe
  if (window.parent === window) return;

  // --- Incoming message handler ---
  window.addEventListener('message', function (e) {
    if (!e.data || !e.data.type) return;

    if (e.data.type === 'setComplexity') {
      var slider = document.getElementById('complexitySlider');
      var label  = document.getElementById('complexityValue');
      if (slider && e.data.value !== undefined) {
        slider.value = Math.max(1, Math.min(100, e.data.value));
        if (label) label.textContent = slider.value;
      }
    } else if (e.data.type === 'reset') {
      // Trigger new challenge via the refresh button
      var btn = document.getElementById('refreshBtn');
      if (btn) btn.click();
    }
  });

  // --- Outgoing: throttled mousemove forwarding ---
  var lastMoveAt = 0;
  var MOVE_INTERVAL_MS = 40; // ~25 fps throttle

  function postToParent(type, e) {
    window.parent.postMessage({
      type: type,
      clientX: e.clientX,
      clientY: e.clientY,
      timestamp: performance.now()
    }, '*');
  }

  document.addEventListener('mousemove', function (e) {
    var now = performance.now();
    if (now - lastMoveAt < MOVE_INTERVAL_MS) return;
    lastMoveAt = now;
    postToParent('captcha:mouseMove', e);
  }, { passive: true });

  // --- Outgoing: click forwarding (capture phase) ---
  document.addEventListener('click', function (e) {
    postToParent('captcha:click', e);
  }, true);

  // --- Outgoing: captcha:status and captcha:result ---
  // Observe DOM elements to detect state changes without modifying the main App.
  var statusSent = '';
  var resultSent = false;

  function checkStatus() {
    var statusEl     = document.getElementById('status');
    var confidenceEl = document.getElementById('confidence');
    if (!statusEl) return;

    var statusText     = statusEl.textContent || '';
    var confidenceText = confidenceEl ? confidenceEl.textContent || '' : '';

    // Detect solving state (status not empty, no confidence yet)
    if (statusText && !confidenceText && statusSent !== 'solving') {
      statusSent = 'solving';
      window.parent.postMessage({ type: 'captcha:status', status: 'solving' }, '*');
    }

    // Detect final result (confidence displayed with %)
    if (confidenceText && confidenceText.indexOf('%') !== -1 && !resultSent) {
      resultSent = true;
      var match = confidenceText.match(/(\d+)%/);
      var confidence = match ? parseInt(match[1], 10) : 0;
      window.parent.postMessage({ type: 'captcha:status', status: 'solved' }, '*');
      window.parent.postMessage({ type: 'captcha:result', confidence: confidence, time: performance.now() }, '*');
    }
  }

  // Observe status and confidence elements for changes
  var observer = new MutationObserver(function () { checkStatus(); });
  function observeEl(id) {
    var el = document.getElementById(id);
    if (el) observer.observe(el, { childList: true, characterData: true, subtree: true });
  }
  observeEl('status');
  observeEl('confidence');

  // Reset tracking when a new challenge starts
  var refreshBtn2 = document.getElementById('refreshBtn');
  if (refreshBtn2) {
    refreshBtn2.addEventListener('click', function () {
      statusSent = '';
      resultSent = false;
    });
  }
})();
</script>
</div><!-- end shell -->
