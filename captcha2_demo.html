      gap: 10px;

      justify-content: space-between;

    .controls-row label {
      color: #222;
      font-size: 14px;
      font-weight: 600;
    }

    .controls-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

      width: 100%;
      margin-top: 12px;
      accent-color: #01696F;

    #metaRow {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: #666;
      font-size: 13px;
      flex-wrap: wrap;
      align-items: center;
    }

    #tierBadge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      background: #efefef;
      color: #333;
      font-weight: 600;
      font-size: 13px;
    }

    button {
      appearance: none;
      border: 1px solid #d0d0d0;
      background: #fff;
      color: #222;
      border-radius: 10px;
      padding: 9px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 120ms ease, border-color 120ms ease, box-shadow 120ms ease;

    button:hover {
      background: #f7f7f7;
      border-color: #b8b8b8;
    }

      background: #f0f0f0;
    }

    button:focus-visible {
      outline: 2px solid rgba(66,133,244,0.5);
      outline-offset: 2px;
    }

      display: none;
    }

    // =========================================================================
    // Build tier index
    // =========================================================================
    var SETS_BY_TIER = {
      1: CHALLENGE_SETS.filter(function(s) { return s.difficulty === 1; }),
      2: CHALLENGE_SETS.filter(function(s) { return s.difficulty === 2; }),
      3: CHALLENGE_SETS.filter(function(s) { return s.difficulty === 3; }),
      4: CHALLENGE_SETS.filter(function(s) { return s.difficulty === 4; })
    };

    // Runtime validation
    (function() {
      var expected = { 1: 32, 2: 32, 3: 20, 4: 12 };
      for (var tier in expected) {
        if (SETS_BY_TIER[tier].length !== expected[tier]) {
          console.error('Tier ' + tier + ' expected ' + expected[tier] + ' sets but got ' + SETS_BY_TIER[tier].length);
        }
      }
      if (CHALLENGE_SETS.length !== 96) {
        console.error('Expected 96 total sets but got ' + CHALLENGE_SETS.length);
      }
    })();

    // =========================================================================
    // Font stacks for visual variation
    // =========================================================================
    var FONT_STACKS = [
      '"Arial", sans-serif',
      '"Trebuchet MS", sans-serif',
      '"Verdana", sans-serif',
      '"Tahoma", sans-serif'
    ];

    // =========================================================================
    // Card background palettes
    // =========================================================================
    var CARD_PALETTES = [
      { bg: '#FAFAFA', border: '#D8D8D8', shadow: 'rgba(0,0,0,0.08)' },
      { bg: '#FDF8F0', border: '#E4D5C0', shadow: 'rgba(120,80,20,0.07)' },
      { bg: '#F0F5FA', border: '#C5D5E8', shadow: 'rgba(20,60,120,0.07)' },
      { bg: '#F5F0F5', border: '#D8C8D8', shadow: 'rgba(80,20,80,0.07)' }
    ];

    // =========================================================================
    // Tier display names
    // =========================================================================
    var TIER_NAMES = { 1: 'Easy', 2: 'Medium', 3: 'Hard', 4: 'Expert' };
    var TIER_COLORS = { 1: '#437A22', 2: '#01696F', 3: '#964219', 4: '#A12C7B' };

    // =========================================================================
    // PRNG: xorshift32 (deterministic, seeded)
    // =========================================================================
    function xorshift32(seed) {
      var s = seed | 0;
      if (s === 0) s = 1;
      return function() {
        s ^= s << 13;
        s ^= s >> 17;
        s ^= s << 5;
        return (s >>> 0) / 4294967296;
      };
    }

    // =========================================================================
    // Cryptographic random uint32
    // =========================================================================
    function randomUint32() {
      var buf = new Uint32Array(1);
      if (window.crypto && crypto.getRandomValues) {
        crypto.getRandomValues(buf);
        return buf[0] >>> 0;
      }
      return Math.floor(Math.random() * 0x100000000) >>> 0;
    }

    // =========================================================================
    // Normalize complexity value to 1..100
    // =========================================================================
    function normalizeComplexity(v) {
      v = Math.round(Number(v) || 1);
      if (v < 1) return 1;
      if (v > 100) return 100;
      return v;
    }

    // =========================================================================
    // Weighted tier selection matching production logic
    // =========================================================================
    function selectTier(complexity, rng) {
      var roll = Math.floor(rng() * 100);
      if (complexity <= 10) return 1;
      if (complexity <= 20) return roll < 85 ? 1 : 2;
      if (complexity <= 25) return roll < 70 ? 1 : 2;
      if (complexity <= 40) return 2;
      if (complexity <= 55) return roll < 80 ? 2 : 3;
      if (complexity <= 70) return 3;
      if (complexity <= 80) return roll < 70 ? 3 : 4;
      if (complexity <= 90) return 4;
      return roll < 85 ? 4 : 3;
    }

    // =========================================================================
    // Fisher-Yates shuffle
    // =========================================================================
    function shuffle4(arr, rng) {
      for (var i = arr.length - 1; i > 0; i--) {
        var j = Math.floor(rng() * (i + 1));
        var tmp = arr[i];
        arr[i] = arr[j];
        arr[j] = tmp;
      }
    }

    // =========================================================================
    // Confidence calculation (production logic)
    // =========================================================================
    function computeConfidence(correct, elapsedMs) {
      if (!correct) return 0;
      if (elapsedMs < 250) return 55;
      if (elapsedMs < 450) return 65;
      if (elapsedMs < 800) return 74;
      if (elapsedMs <= 5000) return 80;
      if (elapsedMs <= 12000) return 76;
      if (elapsedMs <= 20000) return 70;
      return 60;
    }

    // =========================================================================
    // Canvas helpers
    // =========================================================================

    // Wrap text into lines fitting maxWidth (canvas-based measurement)
    function wrapText(ctx, text, maxWidth, maxLines) {
      var words = text.split(' ');
      var lines = [];
      var current = '';
      for (var wi = 0; wi < words.length; wi++) {
        var w = words[wi];
        var test = current ? current + ' ' + w : w;
        if (ctx.measureText(test).width > maxWidth && current) {
          lines.push(current);
          current = w;
          if (lines.length >= maxLines) break;
        } else {
          current = test;
        }
      }
      if (current && lines.length < maxLines) lines.push(current);
      return lines;
    }

    // Draw a rounded rectangle path
    function drawRoundedRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    // Draw subtle noise overlay for anti-bot visual appearance
    function drawNoiseOverlay(ctx, x, y, w, h, rng, intensity) {
      var dotCount = Math.floor(8 + intensity * 12);
      for (var i = 0; i < dotCount; i++) {
        var dx = x + rng() * w;
        var dy = y + rng() * h;
        var alpha = 0.02 + rng() * 0.04;
        var gray = Math.floor(100 + rng() * 100);
        ctx.fillStyle = 'rgba(' + gray + ',' + gray + ',' + gray + ',' + alpha + ')';
        ctx.fillRect(dx, dy, 1.5, 1.5);
      }
      var lineCount = rng() > 0.5 ? 2 : 1;
      for (var li = 0; li < lineCount; li++) {
        ctx.strokeStyle = 'rgba(160,160,160,' + (0.03 + rng() * 0.04) + ')';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(x + rng() * w, y + rng() * h);
        ctx.lineTo(x + rng() * w, y + rng() * h);
        ctx.stroke();
      }
    }

    // =========================================================================
    // Main application class
    // =========================================================================
    function ImpossibleRealityDemoApp() {
      this.canvas = null;
      this.ctx = null;
      this.rangeEl = null;
      this.refreshBtn = null;
      this.newTaskBtn = null;
      this.complexityValueEl = null;
      this.tierBadgeEl = null;
      this.confidenceLabelEl = null;

      this.state = {
        payload: null,
        cards: [],
        hoveredIndex: -1,
        selectedIndex: -1,
        submitted: false,
        resultPhase: 'idle',
        correctIndex: -1,
        wrongIndex: -1,
        confidence: null,
        renderStartTs: 0,
        canvasWidth: 0,
        canvasHeight: 0,
        dpr: 1
      };

      this.pendingRevealTimer = null;
    }

    // =========================================================================
    // Initialize and run the demo
    // =========================================================================
    ImpossibleRealityDemoApp.prototype.run = function() {
      // Cache DOM references
      this.canvas = document.getElementById('captchaCanvas');
      this.ctx = this.canvas.getContext('2d');
      this.rangeEl = document.getElementById('complexityRange');
      this.refreshBtn = document.getElementById('refreshBtn');
      this.newTaskBtn = document.getElementById('newTaskBtn');
      this.complexityValueEl = document.getElementById('complexityValue');
      this.tierBadgeEl = document.getElementById('tierBadge');
      this.confidenceLabelEl = document.getElementById('confidenceLabel');

      // Setup canvas with DPR support
      this.state.dpr = Math.min(window.devicePixelRatio || 1, 3);
      this.resizeCanvas();

      // Bind all events
      this.bindEvents();

      // Update complexity label from initial slider value
      this.complexityValueEl.textContent = this.rangeEl.value;

      // Generate the first challenge and render
      this.generateChallenge();
    };

    // =========================================================================
    // Bind DOM and canvas events
    // =========================================================================
    ImpossibleRealityDemoApp.prototype.bindEvents = function() {
      var self = this;

      // Slider input updates the label live
      this.rangeEl.addEventListener('input', function() {
        self.complexityValueEl.textContent = self.rangeEl.value;
      });

      // Refresh button generates new challenge with current slider value
      this.refreshBtn.addEventListener('click', function() {
        self.generateChallenge();
      });

      // New task button (visible only after answering)
      this.newTaskBtn.addEventListener('click', function() {
        self.generateChallenge();
      });

      // Canvas pointer events for hover and click
      this.canvas.addEventListener('pointermove', function(ev) {
        self.handlePointerMove(ev);
      });
      this.canvas.addEventListener('pointerleave', function() {
        self.handlePointerLeave();
      });
      this.canvas.addEventListener('pointerup', function(ev) {
        self.handlePointerUp(ev);
      });
      this.canvas.addEventListener('pointerdown', function(ev) {
        // Prevent text selection on canvas
        ev.preventDefault();
      });

      // Resize handler
      window.addEventListener('resize', function() {
        self.state.dpr = Math.min(window.devicePixelRatio || 1, 3);
        self.resizeCanvas();
        if (self.state.payload) {
          self.buildCards();
          self.render();
        }
      });
    };

    // =========================================================================
    // Resize canvas to match shell container and handle DPR
    // =========================================================================
    ImpossibleRealityDemoApp.prototype.resizeCanvas = function() {
      var shell = this.canvas.parentElement;
      var w = shell.clientWidth;
      var h = shell.clientHeight;
      this.state.canvasWidth = w;
      this.state.canvasHeight = h;
      this.canvas.width = Math.round(w * this.state.dpr);
      this.canvas.height = Math.round(h * this.state.dpr);
      this.canvas.style.width = w + 'px';
      this.canvas.style.height = h + 'px';
      this.ctx.setTransform(this.state.dpr, 0, 0, this.state.dpr, 0, 0);
    };

    // =========================================================================
    // Generate a new challenge from built-in sets
    // =========================================================================
    ImpossibleRealityDemoApp.prototype.generateChallenge = function() {
      // Clear any pending reveal timer
      if (this.pendingRevealTimer) {
        clearTimeout(this.pendingRevealTimer);
        this.pendingRevealTimer = null;
      }

      var complexity = normalizeComplexity(this.rangeEl.value);
      var tierRng = xorshift32(randomUint32());
      var tier = selectTier(complexity, tierRng);
      var tierSets = SETS_BY_TIER[tier];
      var set = tierSets[Math.floor(tierRng() * tierSets.length)];

      // Shuffle order of 4 cards
      var order = [0, 1, 2, 3];
      shuffle4(order, tierRng);
      var absurdPosition = order.indexOf(set.absurdIndex);
      var statements = [];
      for (var i = 0; i < 4; i++) {
        statements.push(set.statements[order[i]]);
      }

      // Build the payload object
      this.state.payload = {
        setId: set.id,
        topic: set.topic,
        complexity: complexity,
        tier: tier,
        renderSeed: randomUint32(),
        layoutSeed: randomUint32(),
        variantFlags: Math.floor(tierRng() * 4096),
        absurdIndexCanonical: set.absurdIndex,
        absurdPosition: absurdPosition,
        order: order,
        statements: statements,
        createdAt: Date.now()
      };

      // Reset result state
      this.state.selectedIndex = -1;
      this.state.submitted = false;
      this.state.resultPhase = 'idle';
      this.state.correctIndex = -1;
      this.state.wrongIndex = -1;
      this.state.confidence = null;
      this.state.hoveredIndex = -1;
      this.state.renderStartTs = performance.now();

      // Hide new task button
      this.newTaskBtn.hidden = true;

      // Build card layout and render
      this.buildCards();
      this.updateMetaUI();
      this.render();
    };

    // =========================================================================
    // Build card geometry from current payload and canvas size
    // =========================================================================
    ImpossibleRealityDemoApp.prototype.buildCards = function() {
      var p = this.state.payload;
      if (!p) return;

      var w = this.state.canvasWidth;
      var h = this.state.canvasHeight;

      // Layout constants matching production
      var padding = 16;
      var titleHeight = 32;
      var instructionHeight = 22;
      var headerGap = 8;
      var gap = 14;

      var gridTop = padding + titleHeight + headerGap + instructionHeight + headerGap;
      var cardW = Math.floor((w - padding * 2 - gap) / 2);
      var cardH = Math.floor((h - gridTop - padding - gap) / 2);

      // Decode variant flags
      var fontProfile = p.variantFlags & 0x03;
      var paletteProfile = (p.variantFlags >> 2) & 0x03;
      var rotationIntensity = (p.variantFlags >> 8) & 0x03;

      var rng = xorshift32(p.renderSeed);
      var lrng = xorshift32(p.layoutSeed);

      var cards = [];
      for (var i = 0; i < 4; i++) {
        var col = i % 2;
        var row = Math.floor(i / 2);
        var x = padding + col * (cardW + gap) + (lrng() - 0.5) * 3;
        var y = gridTop + row * (cardH + gap) + (lrng() - 0.5) * 3;
        var maxAngle = 0.4 + rotationIntensity * 0.5;
        var rotation = (rng() - 0.5) * maxAngle * (Math.PI / 180) * 2;

        cards.push({
          index: i,
          text: p.statements[i],
          x: x,
          y: y,
          w: cardW,
          h: cardH,
          rotation: rotation,
          textLines: [],
          paletteIndex: (paletteProfile + i) % CARD_PALETTES.length,
          fontIndex: (fontProfile + i) % FONT_STACKS.length
        });
      }

      // Calculate text wrapping for each card
      var fontSize = Math.max(14, Math.min(20, Math.floor(cardW / 12)));
      var innerPad = 14;
      var maxTextWidth = cardW - innerPad * 2;

      for (var ci = 0; ci < cards.length; ci++) {
        var card = cards[ci];
        var font = '600 ' + fontSize + 'px ' + FONT_STACKS[card.fontIndex];
        this.ctx.font = font;
        var lines = wrapText(this.ctx, card.text, maxTextWidth, 3);
        // If 3 lines at base size, try smaller font
        if (lines.length >= 3) {
          var smallerFont = '600 ' + (fontSize - 2) + 'px ' + FONT_STACKS[card.fontIndex];
          this.ctx.font = smallerFont;
          lines = wrapText(this.ctx, card.text, maxTextWidth, 3);
        }
        card.textLines = lines;
      }

      this.state.cards = cards;
    };

    // =========================================================================
    // Hit-test: find which card index contains the given CSS coordinates
    // =========================================================================
    ImpossibleRealityDemoApp.prototype.hitTest = function(x, y) {
      var cards = this.state.cards;
      for (var i = 0; i < cards.length; i++) {
        var c = cards[i];
        if (x >= c.x && x <= c.x + c.w && y >= c.y && y <= c.y + c.h) {
          return c.index;
        }
      }
      return -1;
    };

    // =========================================================================
    // Pointer move: update hover state
    // =========================================================================
    ImpossibleRealityDemoApp.prototype.handlePointerMove = function(ev) {
      if (this.state.submitted || !this.state.payload) return;
      var rect = this.canvas.getBoundingClientRect();
      var x = ev.clientX - rect.left;
      var y = ev.clientY - rect.top;
      var idx = this.hitTest(x, y);
      if (idx !== this.state.hoveredIndex) {
        this.state.hoveredIndex = idx;
        this.render();
      }
      this.canvas.style.cursor = idx >= 0 ? 'pointer' : 'default';
    };

    // =========================================================================
    // Pointer leave: clear hover
    // =========================================================================
    ImpossibleRealityDemoApp.prototype.handlePointerLeave = function() {
      if (this.state.submitted) return;
      if (this.state.hoveredIndex !== -1) {
        this.state.hoveredIndex = -1;
        this.render();
      }
      this.canvas.style.cursor = 'default';
    };

    // =========================================================================
    // Pointer up: handle card selection
    // =========================================================================
    ImpossibleRealityDemoApp.prototype.handlePointerUp = function(ev) {
      if (this.state.submitted || !this.state.payload) return;
      var rect = this.canvas.getBoundingClientRect();
      var x = ev.clientX - rect.left;
      var y = ev.clientY - rect.top;
      var idx = this.hitTest(x, y);
      if (idx < 0) return;

      var elapsedMs = performance.now() - this.state.renderStartTs;
      var correct = (idx === this.state.payload.absurdPosition);

      this.state.selectedIndex = idx;
      this.state.submitted = true;
      this.state.hoveredIndex = -1;
      this.canvas.style.cursor = 'default';
      this.state.confidence = computeConfidence(correct, elapsedMs);

      if (correct) {
        // Correct answer
        this.state.correctIndex = idx;
        this.state.resultPhase = 'resolved';
        this.newTaskBtn.hidden = false;
        this.updateMetaUI();
        this.render();
        return;
      }

      // Wrong answer: show red immediately, reveal correct after 500ms
      this.state.wrongIndex = idx;
      this.state.resultPhase = 'wrong-pending';
      this.updateMetaUI();
      this.render();

      var self = this;
      this.pendingRevealTimer = setTimeout(function() {
        self.state.correctIndex = self.state.payload.absurdPosition;
        self.state.resultPhase = 'resolved';
        self.newTaskBtn.hidden = false;
        self.updateMetaUI();
        self.render();
      }, 500);
    };

    // =========================================================================
    // Update meta UI elements (tier badge, confidence)
    // =========================================================================
    ImpossibleRealityDemoApp.prototype.updateMetaUI = function() {
      var p = this.state.payload;
      if (!p) return;

      // Tier badge
      var tierName = TIER_NAMES[p.tier] || 'Unknown';
      var tierColor = TIER_COLORS[p.tier] || '#333';
      this.tierBadgeEl.textContent = tierName + ' (Set #' + p.setId + ')';
      this.tierBadgeEl.style.background = tierColor;
      this.tierBadgeEl.style.color = '#fff';

      // Complexity value
      this.complexityValueEl.textContent = p.complexity;

      // Confidence
      if (this.state.confidence !== null) {
        this.confidenceLabelEl.textContent = '\u0423\u0432\u0435\u0440\u0435\u043D\u043D\u043E\u0441\u0442\u044C: ' + this.state.confidence + '%';
      } else {
        this.confidenceLabelEl.textContent = '\u0423\u0432\u0435\u0440\u0435\u043D\u043D\u043E\u0441\u0442\u044C: \u2014';
      }
    };

    // =========================================================================
    // Main render function: full canvas repaint
    // =========================================================================
    ImpossibleRealityDemoApp.prototype.render = function() {
      var ctx = this.ctx;
      var w = this.state.canvasWidth;
      var h = this.state.canvasHeight;
      var p = this.state.payload;
      var cards = this.state.cards;

      if (!p || cards.length === 0) return;

      var rng = xorshift32(p.renderSeed + 7919);

      // Decode variant flags for visual variation
      var enableGrain = (p.variantFlags >> 4) & 0x01;
      var enableHatch = (p.variantFlags >> 5) & 0x01;
      var widerSpacing = (p.variantFlags >> 7) & 0x01;

      // Clear and draw main background
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = '#F5F5F5';
      drawRoundedRect(ctx, 0, 0, w, h, 20);
      ctx.fill();

      // Draw title
      var padding = 16;
      ctx.fillStyle = '#222';
      ctx.font = 'bold 18px "Arial", sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText('\u0427\u0442\u043E \u043D\u0435\u0432\u043E\u0437\u043C\u043E\u0436\u043D\u043E \u0432 \u0440\u0435\u0430\u043B\u044C\u043D\u043E\u0439 \u0436\u0438\u0437\u043D\u0438?', padding, padding);

      // Draw subtitle
      ctx.fillStyle = '#666';
      ctx.font = '400 13px "Arial", sans-serif';
      ctx.fillText('\u041D\u0430\u0436\u043C\u0438\u0442\u0435 \u043D\u0430 \u043A\u0430\u0440\u0442\u043E\u0447\u043A\u0443 \u0441 \u043D\u0435\u0432\u043E\u0437\u043C\u043E\u0436\u043D\u043E\u0439 \u0441\u0438\u0442\u0443\u0430\u0446\u0438\u0435\u0439', padding, padding + 34);

      // Draw each card
      for (var i = 0; i < cards.length; i++) {
        this.drawCard(ctx, cards[i], rng, enableGrain, enableHatch, widerSpacing);
      }

      // Draw result banner if resolved
      if (this.state.resultPhase === 'resolved') {
        this.drawResultBanner(ctx, w, h);
      } else if (this.state.resultPhase === 'wrong-pending') {
        this.drawWrongBanner(ctx, w, h);
      }
    };

    // =========================================================================
    // Draw a single card on canvas
    // =========================================================================
    ImpossibleRealityDemoApp.prototype.drawCard = function(ctx, card, rng, enableGrain, enableHatch, widerSpacing) {
      var pal = CARD_PALETTES[card.paletteIndex];
      var rad = 14;
      var hovered = (this.state.hoveredIndex === card.index && !this.state.submitted);
      var isCorrect = (this.state.correctIndex === card.index);
      var isWrong = (this.state.wrongIndex === card.index);

      ctx.save();

      // Translate to card center, apply rotation, then draw from top-left
      var cx = card.x + card.w / 2;
      var cy = card.y + card.h / 2;
      ctx.translate(cx, cy);
      ctx.rotate(card.rotation);
      ctx.translate(-card.w / 2, -card.h / 2);

      // Shadow
      ctx.shadowColor = pal.shadow;
      ctx.shadowBlur = hovered ? 12 : 6;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = hovered ? 3 : 2;

      // Card background
      ctx.fillStyle = pal.bg;
      drawRoundedRect(ctx, 0, 0, card.w, card.h, rad);
      ctx.fill();

      // Reset shadow
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;

      // Card border
      ctx.strokeStyle = hovered ? '#888' : pal.border;
      ctx.lineWidth = hovered ? 2 : 1;
      drawRoundedRect(ctx, 0, 0, card.w, card.h, rad);
      ctx.stroke();

      // Noise overlay (anti-bot visual texture)
      if (enableGrain) {
        drawNoiseOverlay(ctx, 2, 2, card.w - 4, card.h - 4, rng, 0.5);
      }

      // Hatch lines
      if (enableHatch) {
        ctx.strokeStyle = 'rgba(0,0,0,0.015)';
        ctx.lineWidth = 0.5;
        for (var hi = 0; hi < 3; hi++) {
          ctx.beginPath();
          ctx.moveTo(rng() * card.w, 0);
          ctx.lineTo(rng() * card.w, card.h);
          ctx.stroke();
        }
      }

      // Draw card text (canvas rendered, no DOM)
      var fontSize = Math.max(14, Math.min(20, Math.floor(card.w / 12)));
      // Check if smaller font was used
      var actualFontSize = fontSize;
      if (card.textLines.length >= 3) {
        actualFontSize = fontSize - 2;
      }
      var lineHeight = actualFontSize * (1.35 + widerSpacing * 0.1);
      ctx.font = '600 ' + actualFontSize + 'px ' + FONT_STACKS[card.fontIndex];
      var textBlockHeight = card.textLines.length * lineHeight;
      var startY = (card.h - textBlockHeight) / 2 + actualFontSize * 0.85;

      ctx.fillStyle = '#2A2A2A';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      for (var li = 0; li < card.textLines.length; li++) {
        ctx.fillText(card.textLines[li], 14, startY + li * lineHeight);
      }

      // Hover highlight (blue outline)
      if (hovered) {
        ctx.strokeStyle = 'rgba(66,133,244,0.5)';
        ctx.lineWidth = 2.5;
        drawRoundedRect(ctx, -1, -1, card.w + 2, card.h + 2, rad + 1);
        ctx.stroke();
      }

      // Correct card highlight (green)
      if (isCorrect) {
        // Green glow
        ctx.strokeStyle = 'rgba(46,155,71,0.22)';
        ctx.lineWidth = 6;
        drawRoundedRect(ctx, -3, -3, card.w + 6, card.h + 6, rad + 3);
        ctx.stroke();

        // Green border
        ctx.strokeStyle = '#2E9B47';
        ctx.lineWidth = 3;
        drawRoundedRect(ctx, 0, 0, card.w, card.h, rad);
        ctx.stroke();

        // Success badge
        this.drawSuccessBadge(ctx, card);
      }

      // Wrong card highlight (red)
      if (isWrong) {
        // Red overlay
        ctx.fillStyle = 'rgba(204,68,68,0.06)';
        drawRoundedRect(ctx, 0, 0, card.w, card.h, rad);
        ctx.fill();

        // Red border
        ctx.strokeStyle = '#CC4444';
        ctx.lineWidth = 3;
        drawRoundedRect(ctx, 0, 0, card.w, card.h, rad);
        ctx.stroke();

        // Error badge
        this.drawErrorBadge(ctx, card);
      }

      ctx.restore();
    };

    // =========================================================================
    // Draw success badge on correct card
    // =========================================================================
    ImpossibleRealityDemoApp.prototype.drawSuccessBadge = function(ctx, card) {
      var text = '\u2713 \u041F\u0440\u0430\u0432\u0438\u043B\u044C\u043D\u043E!';
      ctx.save();
      ctx.font = '700 13px Arial, sans-serif';
      var textWidth = ctx.measureText(text).width + 20;
      var bx = card.w / 2 - textWidth / 2;
      var by = card.h - 34;
      drawRoundedRect(ctx, bx, by, textWidth, 24, 12);
      ctx.fillStyle = 'rgba(46,155,71,0.92)';
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, card.w / 2, by + 12);
      ctx.restore();
    };

    // =========================================================================
    // Draw error badge on wrong card
    // =========================================================================
    ImpossibleRealityDemoApp.prototype.drawErrorBadge = function(ctx, card) {
      var text = '\u2715 \u041D\u0435\u0432\u0435\u0440\u043D\u043E';
      ctx.save();
      ctx.font = '700 13px Arial, sans-serif';
      var textWidth = ctx.measureText(text).width + 20;
      var bx = card.w / 2 - textWidth / 2;
      var by = card.h - 34;
      drawRoundedRect(ctx, bx, by, textWidth, 24, 12);
      ctx.fillStyle = 'rgba(204,68,68,0.92)';
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, card.w / 2, by + 12);
      ctx.restore();
    };

    // =========================================================================
    // Draw result banner at bottom of canvas (correct scenario)
    // =========================================================================
    ImpossibleRealityDemoApp.prototype.drawResultBanner = function(ctx, w, h) {
      var isCorrect = (this.state.wrongIndex === -1);
      var bannerText, bannerBg;

      if (isCorrect) {
        bannerText = '\u2713 \u041F\u0440\u0430\u0432\u0438\u043B\u044C\u043D\u043E! \u0423\u0432\u0435\u0440\u0435\u043D\u043D\u043E\u0441\u0442\u044C: ' + this.state.confidence + '%';
        bannerBg = 'rgba(46,155,71,0.88)';
      } else {
        bannerText = '\u041F\u0440\u0430\u0432\u0438\u043B\u044C\u043D\u044B\u0439 \u043E\u0442\u0432\u0435\u0442 \u043F\u043E\u0434\u0441\u0432\u0435\u0447\u0435\u043D \u0437\u0435\u043B\u0451\u043D\u044B\u043C';
        bannerBg = 'rgba(80,80,80,0.88)';
      }

      ctx.save();
      ctx.font = '600 14px Arial, sans-serif';
      var tw = ctx.measureText(bannerText).width + 32;
      var bw = Math.min(tw, w - 32);
      var bh = 36;
      var bx = (w - bw) / 2;
      var by = h - 52;

      // Banner shadow
      ctx.shadowColor = 'rgba(0,0,0,0.15)';
      ctx.shadowBlur = 12;
      ctx.shadowOffsetY = 2;

      drawRoundedRect(ctx, bx, by, bw, bh, 18);
      ctx.fillStyle = bannerBg;
      ctx.fill();

      // Reset shadow
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;

      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(bannerText, w / 2, by + bh / 2);
      ctx.restore();
    };

    // =========================================================================
    // Draw wrong-pending banner
    // =========================================================================
    ImpossibleRealityDemoApp.prototype.drawWrongBanner = function(ctx, w, h) {
      var bannerText = '\u2715 \u041D\u0435\u0432\u0435\u0440\u043D\u043E\u2026';
      ctx.save();
      ctx.font = '600 14px Arial, sans-serif';
      var tw = ctx.measureText(bannerText).width + 32;
      var bw = Math.min(tw, w - 32);
      var bh = 36;
      var bx = (w - bw) / 2;
      var by = h - 52;

      ctx.shadowColor = 'rgba(0,0,0,0.15)';
      ctx.shadowBlur = 12;
      ctx.shadowOffsetY = 2;

      drawRoundedRect(ctx, bx, by, bw, bh, 18);
      ctx.fillStyle = 'rgba(204,68,68,0.88)';
      ctx.fill();

      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;

      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(bannerText, w / 2, by + bh / 2);
      ctx.restore();
    };

    // =========================================================================
    // Start the application when DOM is ready
    // =========================================================================
    var app = new ImpossibleRealityDemoApp();
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function() { app.run(); });
    } else {
      app.run();
    }
  </script>

<!-- Iframe-to-parent mouse/click event forwarder for behavioral analysis -->
<script>
(function () {
  // Only activate when running inside an iframe
  if (window.parent === window) return;

  var lastMoveAt = 0;
  var MOVE_INTERVAL_MS = 40; // Throttle to ~25 fps

  function postToParent(type, e) {
    window.parent.postMessage({
      type: type,
      clientX: e.clientX,
      clientY: e.clientY,
      timestamp: performance.now()
    }, '*');
  }

  // Forward throttled mousemove events
  document.addEventListener('mousemove', function (e) {
    var now = performance.now();
    if (now - lastMoveAt < MOVE_INTERVAL_MS) return;
    lastMoveAt = now;
    postToParent('captcha:mouseMove', e);
  }, { passive: true });

  // Forward click events (capture phase for robustness)
  document.addEventListener('click', function (e) {
    postToParent('captcha:click', e);
  }, true);
})();
</script>
