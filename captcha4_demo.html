<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Captcha 4 — Поверни правильно (Demo)</title>
  <style>
    /* ================================================================
       CSS RESET & BASE
       ================================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #0F1117;
      color: #C8C8CC;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
    }

    /* ================================================================
       LAYOUT SHELL
       ================================================================ */
    .shell {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ================================================================
       TOP BAR
       ================================================================ */
    .top-bar {
      background: #161822;
      border-bottom: 1px solid #23263A;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 56px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .logo svg {
      width: 28px;
      height: 28px;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 700;
      color: #E4E4E8;
      letter-spacing: -0.02em;
    }

    .logo-tag {
      font-size: 10px;
      font-weight: 600;
      color: #E4E4E8;
      background: #2A2D3E;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .separator {
      width: 1px;
      height: 24px;
      background: #23263A;
      flex-shrink: 0;
    }

    /* Complexity slider */
    .complexity-control {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .complexity-label {
      font-size: 12px;
      color: #7A7B85;
      white-space: nowrap;
    }

    .complexity-slider {
      width: 160px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #2A2D3E;
      border-radius: 2px;
      outline: none;
    }

    .complexity-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #B8B9C1;
      cursor: pointer;
    }

    .complexity-value {
      font-size: 13px;
      font-weight: 700;
      color: #E4E4E8;
      min-width: 28px;
      text-align: center;
    }

    /* Refresh button */
    .refresh-btn {
      margin-left: auto;
      background: #1E2030;
      color: #B8B9C1;
      border: 1px solid #23263A;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      white-space: nowrap;
      transition: background 0.2s, border-color 0.2s;
    }

    .refresh-btn:hover {
      background: #23263A;
      border-color: #3A3D52;
    }

    /* ================================================================
       MAIN CONTENT AREA
       ================================================================ */
    .main-content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 32px 24px;
    }

    /* ================================================================
       CAPTCHA CARD
       ================================================================ */
    .captcha-card {
      background: #161822;
      border: 1px solid #23263A;
      border-radius: 16px;
      padding: 24px;
      width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .captcha-title {
      font-size: 16px;
      font-weight: 600;
      color: #E4E4E8;
      margin-bottom: 4px;
      text-align: center;
    }

    .captcha-subtitle {
      font-size: 12px;
      color: #7A7B85;
      margin-bottom: 16px;
      text-align: center;
    }

    #captchaCanvas {
      display: block;
      width: 320px;
      height: 320px;
      border-radius: 10px;
      background: #1E2030;
      border: 1px solid #23263A;
    }

    .controls-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 16px;
    }

    .rotate-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid #2A2D3E;
      background: #1E2030;
      font-size: 22px;
      color: #B8B9C1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .rotate-btn:hover {
      background: #2A2D3E;
      color: #E4E4E8;
      border-color: #363A50;
    }

    .rotate-btn:active {
      transform: scale(0.95);
    }

    .rotate-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .action-btn {
      height: 40px;
      padding: 0 28px;
      border-radius: 8px;
      border: none;
      background: #ffffff;
      color: #0F1117;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .action-btn:hover {
      background: #e0e0e0;
    }

    .action-btn:active {
      transform: scale(0.97);
    }

    .action-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .round-info {
      font-size: 12px;
      color: #5A5B65;
      margin-top: 10px;
      text-align: center;
      min-height: 16px;
    }

    .angle-display {
      font-size: 11px;
      color: #5A5B65;
      margin-top: 4px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    /* ================================================================
       RESULT PANEL
       ================================================================ */
    .result-panel {
      width: 380px;
      background: #161822;
      border: 1px solid #23263A;
      border-radius: 16px;
      padding: 20px 24px;
      margin-top: 16px;
      display: none;
    }

    .result-panel.visible { display: block; }

    .result-header {
      font-size: 12px;
      font-weight: 600;
      color: #7A7B85;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
    }

    .result-label {
      font-size: 13px;
      color: #7A7B85;
    }

    .result-value {
      font-size: 13px;
      font-weight: 600;
      color: #E4E4E8;
      font-variant-numeric: tabular-nums;
    }

    .result-value.correct { color: #ffffff; }
    .result-value.wrong { color: #E45A5A; }
    .result-value.partial { color: #E4B95A; }

    .result-divider {
      height: 1px;
      background: #23263A;
      margin: 10px 0;
    }

    .confidence-big {
      font-size: 36px;
      font-weight: 700;
      text-align: center;
      margin: 8px 0;
      font-variant-numeric: tabular-nums;
    }

    .verdict-badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: 0.02em;
      margin: 0 auto;
    }

    .badge-human {
      background: rgba(255, 255, 255, 0.12);
      color: #ffffff;
    }

    .badge-suspicious {
      background: rgba(228, 185, 90, 0.12);
      color: #E4B95A;
    }

    .badge-bot {
      background: rgba(228, 90, 90, 0.12);
      color: #E45A5A;
    }

    .result-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .status-message {
      font-size: 13px;
      color: #7A7B85;
      margin-top: 8px;
      text-align: center;
      min-height: 18px;
    }

    /* ================================================================
       RESPONSIVE
       ================================================================ */
    @media (max-width: 600px) {
      .top-bar {
        height: auto;
        padding: 12px 16px;
      }
      .captcha-card, .result-panel {
        width: 100%;
        max-width: 380px;
      }
      .main-content {
        padding: 16px;
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>

<div class="shell">

  <div class="top-bar">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#B8B9C1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

  <!-- Main content -->
  <div class="main-content">

      <div class="captcha-card">
        <div class="captcha-title">Поверни предмет правильно</div>

          <button class="rotate-btn" id="btnRight" disabled>↻</button>
        </div>
        <div class="round-info" id="roundInfo"></div>
        <div class="angle-display" id="angleDisplay"></div>
        <div class="status-message" id="statusMsg"></div>
      </div>

      <!-- Result panel -->
      <div class="result-panel" id="resultPanel">
        <div class="result-header">Результат проверки</div>
        <div id="roundResults"></div>
        <div class="result-divider"></div>
        <div class="result-center">
          <div class="confidence-big" id="confidenceScore">—</div>
          <div id="verdictBadge"></div>
        </div>
        <div class="result-divider"></div>
        <div class="result-row">
          <span class="result-label">Время</span>
          <span class="result-value" id="elapsedTime">—</span>
        </div>
        <div class="result-row">
          <span class="result-label">Раунды</span>
          <span class="result-value" id="roundSummary">—</span>
        </div>
      </div>
    </div>
  </div>
</div>

// ============================================================
// Complexity profiles (matching backend exactly)
// ============================================================
const PROFILES = [
  { min:1,  max:10,  rounds:1, step:90, opts:4,  diffs:[1], weights:[100], noise:0, flags:0x00, animMin:120, animMax:160, minOffset:1 },
  { min:11, max:20,  rounds:1, step:90, opts:4,  diffs:[1], weights:[100], noise:1, flags:0x01, animMin:120, animMax:160, minOffset:1 },
  { min:21, max:30,  rounds:1, step:60, opts:6,  diffs:[1], weights:[100], noise:1, flags:0x09, animMin:140, animMax:180, minOffset:1 },
  { min:31, max:40,  rounds:1, step:60, opts:6,  diffs:[1,2], weights:[70,30], noise:1, flags:0x0B, animMin:140, animMax:180, minOffset:1 },
  { min:41, max:50,  rounds:2, step:60, opts:6,  diffs:[2], weights:[100], noise:2, flags:0x0F, animMin:160, animMax:220, minOffset:1 },
  { min:51, max:60,  rounds:2, step:45, opts:8,  diffs:[2], weights:[100], noise:2, flags:0x1F, animMin:180, animMax:240, minOffset:1 },
  { min:61, max:70,  rounds:2, step:45, opts:8,  diffs:[2,3], weights:[70,30], noise:3, flags:0x1F, animMin:180, animMax:260, minOffset:2 },
  { min:71, max:80,  rounds:3, step:45, opts:8,  diffs:[2,3], weights:[45,55], noise:3, flags:0x1F, animMin:200, animMax:280, minOffset:2 },
  { min:81, max:90,  rounds:3, step:45, opts:8,  diffs:[3], weights:[100], noise:4, flags:0x1F, animMin:220, animMax:300, minOffset:2 },
  { min:91, max:100, rounds:3, step:30, opts:12, diffs:[3], weights:[100], noise:4, flags:0x1F, animMin:240, animMax:320, minOffset:3 },
];

// ============================================================
// Seeded PRNG
// ============================================================
function mulberry32(seed) {
  let t = seed >>> 0;
  return function() {
    t += 0x6D2B79F5;
    let r = Math.imul(t ^ (t >>> 15), 1 | t);
    r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
    return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
  };
}

function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function normalizeAngle(d) { return ((d % 360) + 360) % 360; }

// ============================================================
// State
// ============================================================
let canvas, ctx, dpr;
let challenge = null; // { profile, rounds: [{sil, initialAngle, correctAngle, animMs, seed}], renderSeed }
let state = null;     // { roundIndex, currentAngle, clickCounts, finalAngles, isAnimating, startTime }
let resultShown = false;

// ============================================================
// DOM
// ============================================================
const $ = id => document.getElementById(id);

// ============================================================
// Initialization
// ============================================================
function initCanvas() {
  canvas = $('captchaCanvas');
  ctx = canvas.getContext('2d');
  dpr = window.devicePixelRatio || 1;
  canvas.width = 320 * dpr;
  canvas.height = 320 * dpr;
  canvas.style.width = '320px';
  canvas.style.height = '320px';
  ctx.fillStyle = '#1E2030';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function profileFor(level) {
  for (const p of PROFILES) {
    if (level >= p.min && level <= p.max) return p;
  }
  return PROFILES[0];
}

function pickDifficulty(profile) {
  if (profile.diffs.length === 1) return profile.diffs[0];
  let total = 0;
  for (const w of profile.weights) total += w;
  let r = Math.random() * total;
  let cum = 0;
  for (let i = 0; i < profile.weights.length; i++) {
    cum += profile.weights[i];
    if (r < cum) return profile.diffs[i];
  }
  return profile.diffs[profile.diffs.length - 1];
}

function pickSilhouette(diff, usedIds) {
  const candidates = Object.values(SILHOUETTES).filter(s => s.diff === diff && !usedIds.has(s.id));
  if (candidates.length > 0) return candidates[Math.floor(Math.random() * candidates.length)];
  // Fallback: any silhouette not used
  const fallback = Object.values(SILHOUETTES).filter(s => !usedIds.has(s.id));
  return fallback[Math.floor(Math.random() * fallback.length)];
}

function pickInitialAngle(step, opts, minOffset) {
  const maxOff = opts - 1;
  const minOff = Math.min(minOffset, maxOff);
  const possible = [];
  for (let i = minOff; i <= maxOff; i++) possible.push(i);
  if (possible.length === 0) possible.push(1);
  const off = possible[Math.floor(Math.random() * possible.length)];
  return off * step;
}

function randRange(min, max) { return min + Math.floor(Math.random() * (max - min + 1)); }

// ============================================================
// New challenge
// ============================================================
function newChallenge() {
  const complexity = parseInt($('complexitySlider').value);
  const profile = profileFor(complexity);
  const usedIds = new Set();
  const rounds = [];
  const renderSeed = (Math.random() * 0xFFFFFFFF) >>> 0;

  for (let i = 0; i < profile.rounds; i++) {
    const diff = pickDifficulty(profile);
    const sil = pickSilhouette(diff, usedIds);
    usedIds.add(sil.id);
    const initial = pickInitialAngle(profile.step, profile.opts, profile.minOffset);
    const animMs = randRange(profile.animMin, profile.animMax);
    const roundSeed = (Math.random() * 0xFFFFFFFF) >>> 0;
    rounds.push({
      sil: sil,
      initialAngle: initial,
      correctAngle: 0,
      animMs: animMs,
      seed: roundSeed,
    });
  }

  challenge = { profile, rounds, renderSeed, complexity };
  state = {
    roundIndex: 0,
    currentAngle: rounds[0].initialAngle,
    clickCounts: [0, 0, 0],
    finalAngles: [0, 0, 0],
    isAnimating: false,
    startTime: performance.now(),
  };
  resultShown = false;
  $('resultPanel').classList.remove('visible');
  $('statusMsg').textContent = '';
  loadRound(0);
}

function loadRound(idx) {
  state.roundIndex = idx;
  const round = challenge.rounds[idx];
  state.currentAngle = round.initialAngle;

  if (challenge.rounds.length > 1) {
    $('roundInfo').textContent = `Раунд ${idx + 1} из ${challenge.rounds.length}`;
  } else {
    $('roundInfo').textContent = '';
  }

  $('btnNext').textContent = (idx === challenge.rounds.length - 1) ? 'Подтвердить' : 'Далее';
  enableControls(true);
  render();
  updateAngleDisplay();
}

function enableControls(on) {
  $('btnLeft').disabled = !on;
  $('btnRight').disabled = !on;
  $('btnNext').disabled = !on;
}

// ============================================================
// Rotation
// ============================================================
function rotateBy(stepDeg) {
  if (!challenge || state.isAnimating) return;
  state.isAnimating = true;
  const from = state.currentAngle;
  const dur = challenge.rounds[state.roundIndex].animMs;
  const start = performance.now();

  function anim() {
    const t = Math.min(1, (performance.now() - start) / dur);
    state.currentAngle = normalizeAngle(from + stepDeg * easeOutCubic(t));
    render();
    updateAngleDisplay();
    if (t < 1) {
      requestAnimationFrame(anim);
    } else {
      // Round to integer to avoid float precision bugs in angle comparison
      state.currentAngle = Math.round(normalizeAngle(Math.round((from + stepDeg) / challenge.profile.step) * challenge.profile.step));
      state.clickCounts[state.roundIndex]++;
      state.isAnimating = false;
      render();
      updateAngleDisplay();
    }
  }
  requestAnimationFrame(anim);
}

function updateAngleDisplay() {
  $('angleDisplay').textContent = `Поворот: ${Math.round(normalizeAngle(state.currentAngle))}°`;
}

function onNext() {
  if (!challenge || state.isAnimating || resultShown) return;

  state.finalAngles[state.roundIndex] = Math.round(normalizeAngle(state.currentAngle));
  const round = challenge.rounds[state.roundIndex];

  // Round guard
  if (state.clickCounts[state.roundIndex] === 0 && round.initialAngle !== 0) {
    $('statusMsg').textContent = 'Поверните объект хотя бы раз';
    return;
  }
  $('statusMsg').textContent = '';

  if (state.roundIndex < challenge.rounds.length - 1) {
    enableControls(false);
    ctx.fillStyle = 'rgba(30, 32, 48, 0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    setTimeout(() => loadRound(state.roundIndex + 1), 200);
  } else {
    submitDemo();
  }
}

// ============================================================
// Submit and scoring
// ============================================================
function submitDemo() {
  resultShown = true;
  enableControls(false);
  const elapsedMs = performance.now() - state.startTime;
  const totalRounds = challenge.rounds.length;

  // Check each round (only count actual rounds, not extra array slots)
  let correctCount = 0;
  const roundResults = [];
  for (let i = 0; i < totalRounds; i++) {
    const final = Math.round(normalizeAngle(state.finalAngles[i])) % 360;
    const correct = challenge.rounds[i].correctAngle;
    // Tolerance: accept +-1 degree to handle any residual float issues
    const isCorrect = Math.abs(final - correct) <= 1 || Math.abs(final - correct) >= 359;
    console.log('[captcha4] Round', i+1, ': final=', final, 'correct=', correct, 'isCorrect=', isCorrect);
    if (isCorrect) correctCount++;
    roundResults.push({
      round: i + 1,
      silName: challenge.rounds[i].sil.name,
      finalAngle: final,
      correctAngle: correct,
      correct: isCorrect,
    });
  }

  // Compute confidence
  let score = 0;
  if (correctCount > 0) {
    let base = 80 * (correctCount / totalRounds);
    if (correctCount < totalRounds) base -= (totalRounds - correctCount) * 6;
    if (elapsedMs < totalRounds * 500) {
      base -= 18 * ((totalRounds * 500 - elapsedMs) / (totalRounds * 500));
    }
    if (elapsedMs > 30000) {
      base -= 12 * Math.min(1, (elapsedMs - 30000) / 20000);
    }
    // Click penalty
    let penalty = 0;
    for (let i = 0; i < totalRounds; i++) {
      if (state.clickCounts[i] === 0) penalty += 25;
      if (state.clickCounts[i] >= 12) penalty += 3;
    }
    score = Math.max(0, Math.min(95, Math.round(base - penalty)));
  }

  // Show result
  showResult(roundResults, correctCount, totalRounds, score, elapsedMs);
}

function showResult(roundResults, correctCount, totalRounds, score, elapsedMs) {
  const panel = $('resultPanel');
  panel.classList.add('visible');

  // Round details
  let html = '';
  for (const r of roundResults) {
    const cls = r.correct ? 'correct' : 'wrong';
    const label = r.correct ? '✓ Верно' : `✗ ${r.finalAngle}° (нужно ${r.correctAngle}°)`;
    html += `<div class="result-row">
      <span class="result-label">Раунд ${r.round}: ${r.silName}</span>
      <span class="result-value ${cls}">${label}</span>
    </div>`;
  }
  $('roundResults').innerHTML = html;

  // Confidence
  const confEl = $('confidenceScore');
  confEl.textContent = score;
  confEl.style.color = score >= 60 ? '#ffffff' : score >= 30 ? '#E4B95A' : '#E45A5A';

  // Verdict badge
  let badge = '';
  if (score >= 60) badge = '<span class="verdict-badge badge-human">Человек</span>';
  else if (score >= 30) badge = '<span class="verdict-badge badge-suspicious">Подозрительно</span>';
  else badge = '<span class="verdict-badge badge-bot">Бот</span>';
  $('verdictBadge').innerHTML = badge;

  // Summary
  $('elapsedTime').textContent = (elapsedMs / 1000).toFixed(1) + ' сек';
  const rCls = correctCount === totalRounds ? 'correct' : correctCount > 0 ? 'partial' : 'wrong';
  $('roundSummary').className = 'result-value ' + rCls;
  $('roundSummary').textContent = `${correctCount} / ${totalRounds}`;

  // Animated visual feedback on canvas
  if (correctCount === totalRounds) {
    animateCanvasSuccess();
  } else {
    animateCanvasError();
  }
}

function animateCanvasSuccess() {
  var startTime = performance.now();
  var duration = 600;
  function tick() {
    var elapsed = performance.now() - startTime;
    var t = Math.min(1, elapsed / duration);
    // Ease-out
    var ease = 1 - Math.pow(1 - t, 3);
    // Redraw current frame
    render();
    // Green border pulse
    var borderAlpha = (1 - t) * 0.8;
    var borderWidth = (3 + ease * 4) * dpr;
    ctx.save();
    ctx.strokeStyle = 'rgba(255, 255, 255, ' + borderAlpha + ')';
    ctx.lineWidth = borderWidth;
    ctx.strokeRect(borderWidth / 2, borderWidth / 2, canvas.width - borderWidth, canvas.height - borderWidth);
    // White overlay fading out
    ctx.fillStyle = 'rgba(255, 255, 255, ' + (0.18 * (1 - t)) + ')';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // Scale pulse effect (subtle glow shrink)
    var glowSize = (1 - ease) * 20 * dpr;
    if (glowSize > 1) {
      ctx.shadowColor = 'rgba(255, 255, 255, ' + (0.5 * (1 - t)) + ')';
      ctx.shadowBlur = glowSize;
      ctx.strokeRect(borderWidth / 2, borderWidth / 2, canvas.width - borderWidth, canvas.height - borderWidth);
    }
    ctx.restore();
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function animateCanvasError() {
  var startTime = performance.now();
  var duration = 500;
  var shakeAmplitude = 6 * dpr;
  function tick() {
    var elapsed = performance.now() - startTime;
    var t = Math.min(1, elapsed / duration);
    // Shake offset (decaying sine)
    var decay = 1 - t;
    var shake = Math.sin(t * Math.PI * 6) * shakeAmplitude * decay;
    // Redraw with offset
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, shake, 0);
    render();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    // Red border flash
    var borderAlpha = decay * 0.7;
    var borderWidth = (3 + decay * 3) * dpr;
    ctx.strokeStyle = 'rgba(228, 90, 90, ' + borderAlpha + ')';
    ctx.lineWidth = borderWidth;
    ctx.strokeRect(borderWidth / 2, borderWidth / 2, canvas.width - borderWidth, canvas.height - borderWidth);
    // Red overlay fading
    ctx.fillStyle = 'rgba(228, 90, 90, ' + (0.12 * decay) + ')';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.restore();
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// ============================================================
// Canvas Rendering
// ============================================================
function render() {
  if (!challenge) return;
  const w = canvas.width, h = canvas.height;
  const round = challenge.rounds[state.roundIndex];
  const rng = mulberry32(challenge.renderSeed + round.seed);

  // Background
  ctx.fillStyle = '#1E2030';
  ctx.fillRect(0, 0, w, h);

  // Background noise
  const flags = challenge.profile.flags;
  if (flags & 0x08) drawBgNoise(rng, w, h, challenge.profile.noise);

  // Reference arrow
  drawArrow(rng, w);

  // Decoy marks
  if (flags & 0x10) drawDecoyMarks(rng, w, h);

  // Silhouette
  drawSilhouette(round, rng);

  // Round badge
  if (challenge.rounds.length > 1) drawRoundBadge(w);
}

function drawArrow(rng, cw) {
  const d = dpr;
  const cx = cw / 2;
  const top = 12 * d;
  const len = 24 * d;
  const wv = 1 + (rng() * 0.2 - 0.1);

  ctx.save();
  ctx.strokeStyle = '#B8B9C1';
  ctx.lineWidth = 2.5 * d * wv;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  ctx.beginPath();
  ctx.moveTo(cx, top + len);
  ctx.lineTo(cx, top);
  ctx.stroke();

  const hs = 8 * d;
  ctx.beginPath();
  ctx.moveTo(cx - hs, top + hs);
  ctx.lineTo(cx, top);
  ctx.lineTo(cx + hs, top + hs);
  ctx.stroke();
  ctx.restore();
}

function drawSilhouette(round, rng) {
  const sil = round.sil;
  if (!sil) return;
  const d = dpr;
  const cx = canvas.width / 2;
  const cy = canvas.height / 2 + 8 * d;
  const angleRad = state.currentAngle * Math.PI / 180;
  const scale = 220 * d / 100;

  const hue = Math.floor(rng() * 30 + 200);
  const sat = 15 + Math.floor(rng() * 20);
  const light = 55 + Math.floor(rng() * 15);
  const fill = `hsl(${hue}, ${sat}%, ${light}%)`;

  const flags = challenge.profile.flags;
  const hasStroke = (flags & 0x02) !== 0;
  const sw = hasStroke ? (0.5 + rng() * 1.5) * d : 0;
  const sc = hasStroke ? `hsl(${hue}, ${sat + 10}%, ${light + 15}%)` : '';
  const hasShadow = (flags & 0x04) !== 0;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angleRad);
  ctx.scale(scale, scale);
  ctx.translate(-50, -50);

  if (hasShadow) {
    ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
    ctx.shadowBlur = (2 + rng() * 4) * d;
    ctx.shadowOffsetX = (rng() - 0.5) * 2 * d;
    ctx.shadowOffsetY = (rng() - 0.5) * 2 * d;
  }

  ctx.fillStyle = fill;
  for (const pathStr of sil.paths) {
    const p = new Path2D(pathStr);
    ctx.fill(p);
    if (hasStroke && sw > 0) {
      ctx.strokeStyle = sc;
      ctx.lineWidth = sw / scale;
      ctx.stroke(p);
    }
  }
  ctx.restore();
}

function drawBgNoise(rng, w, h, level) {
  const counts = [0, 15, 30, 55, 90];
  const n = counts[Math.min(level, 4)] || 0;
  ctx.save();
  for (let i = 0; i < n; i++) {
    ctx.beginPath();
    ctx.arc(rng() * w, rng() * h, (rng() * 2 + 0.5) * dpr, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${Math.floor(rng() * 360)}, 20%, 40%, ${0.03 + rng() * 0.04})`;
    ctx.fill();
  }
  if (level >= 3) {
    const lc = level >= 4 ? 6 : 3;
    for (let i = 0; i < lc; i++) {
      ctx.beginPath();
      ctx.moveTo(rng() * w, rng() * h);
      ctx.lineTo(rng() * w, rng() * h);
      ctx.strokeStyle = `rgba(120, 120, 120, ${0.02 + rng() * 0.03})`;
      ctx.lineWidth = 0.5 * dpr;
      ctx.stroke();
    }
  }
  ctx.restore();
}

function drawDecoyMarks(rng, w, h) {
  const d = dpr;
  const cx = w / 2, cy = h / 2 + 8 * d;
  const r = (110 + 20) * d;
  const n = 6 + Math.floor(rng() * 6);
  ctx.save();
  ctx.strokeStyle = `rgba(160, 160, 160, ${0.12 + rng() * 0.12})`;
  ctx.lineWidth = 0.8 * d;
  for (let i = 0; i < n; i++) {
    const a = rng() * Math.PI * 2;
    const l = (3 + rng() * 5) * d;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
    ctx.lineTo(cx + Math.cos(a) * (r + l), cy + Math.sin(a) * (r + l));
    ctx.stroke();
  }
  ctx.restore();
}

function drawRoundBadge(cw) {
  if (!challenge) return;
  const d = dpr;
  const text = `${state.roundIndex + 1}/${challenge.rounds.length}`;
  ctx.save();
  ctx.font = `bold ${11 * d}px -apple-system, sans-serif`;
  const m = ctx.measureText(text);
  const pw = 6 * d, bh = 18 * d;
  const bw = m.width + pw * 2;
  const bx = cw - bw - 8 * d;
  const by = 8 * d;

  ctx.fillStyle = 'rgba(255, 255, 255, 0.06)';
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 4 * d);
  ctx.fill();

  ctx.fillStyle = '#7A7B85';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, bx + bw / 2, by + bh / 2);
  ctx.restore();
}

// ============================================================
// Event bindings
// ============================================================
$('complexitySlider').addEventListener('input', function() {
  $('complexityValue').textContent = this.value;
});

$('btnLeft').addEventListener('click', () => {
  if (challenge) rotateBy(-challenge.profile.step);
});
$('btnRight').addEventListener('click', () => {
  if (challenge) rotateBy(challenge.profile.step);
});
$('btnNext').addEventListener('click', onNext);

// Keyboard support
document.addEventListener('keydown', (e) => {
  if (!challenge || resultShown) return;
  if (e.key === 'ArrowLeft') rotateBy(-challenge.profile.step);
  else if (e.key === 'ArrowRight') rotateBy(challenge.profile.step);
  else if (e.key === 'Enter') onNext();
});

// Initialize
initCanvas();
newChallenge();
</script>

<!-- Parent-iframe integration: incoming commands + outgoing event forwarding -->
<script>
(function () {
  // Only activate when running inside an iframe
  if (window.parent === window) return;

  // --- Incoming message handler ---
  window.addEventListener('message', function (e) {
    if (!e.data || !e.data.type) return;

    if (e.data.type === 'setComplexity') {
      var slider = document.getElementById('complexitySlider');
      var badge  = document.getElementById('complexityValue');
      if (slider && e.data.value !== undefined) {
        slider.value = Math.max(1, Math.min(100, e.data.value));
        if (badge) badge.textContent = slider.value;
      }
    } else if (e.data.type === 'reset') {
      // Trigger new challenge via the button
      var btn = document.getElementById('refreshBtn');
      if (btn) btn.click();
    }
  });

  // --- Outgoing: throttled mousemove forwarding ---
  var lastMoveAt = 0;
  var MOVE_INTERVAL_MS = 40; // ~25 fps throttle

  function postToParent(type, e) {
    window.parent.postMessage({
      type: type,
      clientX: e.clientX,
      clientY: e.clientY,
      timestamp: performance.now()
    }, '*');
  }

  document.addEventListener('mousemove', function (e) {
    var now = performance.now();
    if (now - lastMoveAt < MOVE_INTERVAL_MS) return;
    lastMoveAt = now;
    postToParent('captcha:mouseMove', e);
  }, { passive: true });

  // --- Outgoing: click forwarding (capture phase) ---
  document.addEventListener('click', function (e) {
    postToParent('captcha:click', e);
  }, true);

  // --- Outgoing: captcha:status and captcha:result ---
  // Observe the result panel visibility and confidence score element
  var statusSent = '';
  var resultSent = false;

  function checkResultPanel() {
    var panel = document.getElementById('resultPanel');
    var confEl = document.getElementById('confidenceScore');
    if (!panel) return;

    // Detect solving state (panel not visible yet, challenge started)
    if (!panel.classList.contains('visible') && statusSent !== 'solving') {
      statusSent = 'solving';
      window.parent.postMessage({ type: 'captcha:status', status: 'solving' }, '*');
    }

    // Detect final result (panel becomes visible)
    if (panel.classList.contains('visible') && confEl && !resultSent) {
      var scoreText = confEl.textContent;
      if (scoreText && scoreText !== '—') {
        resultSent = true;
        var confidence = parseInt(scoreText, 10) || 0;
        window.parent.postMessage({ type: 'captcha:status', status: 'solved' }, '*');
        window.parent.postMessage({ type: 'captcha:result', confidence: confidence, time: performance.now() }, '*');
      }
    }
  }

  // Observe the result panel for class changes
  var panel = document.getElementById('resultPanel');
  if (panel) {
    new MutationObserver(function () { checkResultPanel(); })
      .observe(panel, { attributes: true, attributeFilter: ['class'] });
  }

  // Observe confidence score text changes
  var confEl = document.getElementById('confidenceScore');
  if (confEl) {
    new MutationObserver(function () { checkResultPanel(); })
      .observe(confEl, { childList: true, characterData: true, subtree: true });
  }

  // Reset on new challenge
  var refreshBtn = document.getElementById('refreshBtn');
  if (refreshBtn) {
    refreshBtn.addEventListener('click', function () {
      statusSent = '';
      resultSent = false;
    });
  }
})();
</script>
</body>
